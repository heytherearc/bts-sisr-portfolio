    <div id="imageModal" class="fixed inset-0 z-[999] hidden bg-black/95 flex items-center justify-center p-4" onclick="closeModal()">
        <button onclick="modalPrev(event)" class="absolute left-4 md:left-10 z-[1000] bg-white/10 text-white p-4 rounded-full border border-white/10 transition-colors hover:bg-white/20"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg></button>
        <img id="modalImg" src="" class="max-w-full max-h-[85vh] rounded-lg border border-white/10 transition-all duration-300 scale-95 object-contain select-none pointer-events-none">
        <button onclick="modalNext(event)" class="absolute right-4 md:right-10 z-[1000] bg-white/10 text-white p-4 rounded-full border border-white/10 transition-colors hover:bg-white/20"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></button>
        <button onclick="closeModal()" class="absolute top-8 right-8 z-[1000] text-white/50 hover:text-white"><svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
    </div>

    <script>
    // --- 1. SETUP VARIABLES ---
    const carousel = document.getElementById('carousel');
    const indicatorContainer = document.querySelector('.indicator-dots');
    const imagesArray = Array.from(carousel.querySelectorAll('img')).map(img => img.src);
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImg');
    
    let isDown = false, isDragging = false, startX, scrollLeft;
    let currentImageIndex = 0;
    let autoSlideInterval;

    // --- 2. INDICATEURS & AUTO-SLIDE (2.5s) ---
    imagesArray.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = `dot w-1.5 h-1.5 bg-white rounded-full transition ${i === 0 ? 'opacity-100' : 'opacity-20'}`;
        indicatorContainer.appendChild(dot);
    });
    const dots = document.querySelectorAll('.dot');
    
    carousel.addEventListener('scroll', () => {
        const index = Math.round(carousel.scrollLeft / carousel.offsetWidth);
        dots.forEach((dot, i) => dot.style.opacity = i === index ? '1' : '0.2');
    });

    function startAutoSlide() {
        stopAutoSlide();
        autoSlideInterval = setInterval(() => {
            const maxScroll = carousel.scrollWidth - carousel.offsetWidth;
            if (carousel.scrollLeft >= maxScroll - 10) carousel.scrollTo({ left: 0, behavior: 'smooth' });
            else carousel.scrollBy({ left: carousel.offsetWidth, behavior: 'smooth' });
        }, 2500);
    }
    function stopAutoSlide() { clearInterval(autoSlideInterval); }

    startAutoSlide();
    carousel.addEventListener('mouseenter', stopAutoSlide);
    carousel.addEventListener('mouseleave', startAutoSlide);
    carousel.addEventListener('touchstart', stopAutoSlide, {passive: true});
    carousel.addEventListener('touchend', startAutoSlide);

    // --- 3. DESKTOP CAROUSEL ARROWS ---
    window.scrollCarousel = function(dir, e) {
        if(e) e.stopPropagation();
        stopAutoSlide();
        const maxScroll = carousel.scrollWidth - carousel.offsetWidth;
        let newScrollLeft = carousel.scrollLeft + (dir * carousel.offsetWidth);
        
        if (dir === 1 && carousel.scrollLeft >= maxScroll - 10) newScrollLeft = 0;
        else if (dir === -1 && carousel.scrollLeft <= 10) newScrollLeft = maxScroll;
        
        carousel.scrollTo({ left: newScrollLeft, behavior: 'smooth' });
    };

    // --- 4. NORMAL SWIPE (Drag souris) & SMART CLICK ---
    carousel.addEventListener('mousedown', (e) => {
        isDown = true; isDragging = false;
        startX = e.pageX - carousel.offsetLeft;
        scrollLeft = carousel.scrollLeft;
        stopAutoSlide();
    });

    carousel.addEventListener('mousemove', (e) => {
        if (!isDown) return;
        e.preventDefault();
        const x = e.pageX - carousel.offsetLeft;
        const walk = (x - startX) * 2;
        if (Math.abs(walk) > 5) isDragging = true;
        carousel.scrollLeft = scrollLeft - walk;
    });

    carousel.addEventListener('mouseup', () => {
        isDown = false;
        if (!isDragging) {
            const index = Math.round(carousel.scrollLeft / carousel.offsetWidth);
            openModal(imagesArray[index]);
        }
        startAutoSlide();
    });

    carousel.addEventListener('mouseleave', () => { isDown = false; });

    // --- 5. MODAL & ZOOMED SWIPE ---
    function openModal(src) {
        stopAutoSlide();
        currentImageIndex = imagesArray.indexOf(src);
        updateModal();
        modal.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }

    function updateModal() {
        modalImg.src = imagesArray[currentImageIndex];
        modalImg.style.opacity = '0';
        setTimeout(() => { modalImg.style.opacity = '1'; }, 50);
    }

    window.modalNext = function(e) { if(e) e.stopPropagation(); currentImageIndex = (currentImageIndex + 1) % imagesArray.length; updateModal(); }
    window.modalPrev = function(e) { if(e) e.stopPropagation(); currentImageIndex = (currentImageIndex - 1 + imagesArray.length) % imagesArray.length; updateModal(); }
    window.closeModal = function() { modal.classList.add('hidden'); document.body.style.overflow = 'auto'; startAutoSlide(); }

    // Swipe tactile dans la modale
    let touchStartX = 0;
    modal.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
    modal.addEventListener('touchend', e => {
        let touchEndX = e.changedTouches[0].screenX;
        if (touchEndX < touchStartX - 40) modalNext();
        if (touchEndX > touchStartX + 40) modalPrev();
    });

    // Clavier
    document.addEventListener('keydown', (e) => {
        if (!modal.classList.contains('hidden')) {
            if (e.key === "ArrowRight") modalNext();
            if (e.key === "ArrowLeft") modalPrev();
            if (e.key === "Escape") closeModal();
        }
    });
    </script>
