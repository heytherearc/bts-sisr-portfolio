<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Enzo PEBE NGOMA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .input-glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .input-glass:focus { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); outline: none; }
    </style>
</head>
<body class="text-zinc-300 pb-20">

    <nav class="p-8 max-w-6xl mx-auto flex justify-between items-center">
        <a href="index.html" class="text-white font-bold hover:text-blue-400 transition">← Retour</a>
        <div class="flex gap-6 text-xs font-bold uppercase tracking-widest text-zinc-500">
            <a href="index.html" class="hover:text-white transition">Accueil</a>
            <a href="cv.html" class="hover:text-white transition">CV</a>
            <a href="projets.html" class="hover:text-white transition">Projets</a>
            <a href="contact.html" class="text-white border-b border-blue-500">Contact</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <header class="mb-16">
            <h1 class="text-5xl font-extrabold text-white mb-4">Me Contacter</h1>
            <p class="text-zinc-400 text-lg">Envie de discuter d'un projet réseau ou d'une opportunité en alternance ?</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="space-y-8">
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-blue-400 font-bold uppercase text-[10px] tracking-widest mb-2">Email Professionnel</h3>
                    <p class="text-white font-semibold">enzoaxelpbn@gmail.com</p>
                </div>
                
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-emerald-400 font-bold uppercase text-[10px] tracking-widest mb-2">Localisation</h3>
                    <p class="text-white font-semibold">Paris, France</p>
                </div>

                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-zinc-500 font-bold uppercase text-[10px] tracking-widest mb-2">Réseaux</h3>
                    <div class="flex gap-4 mt-2">
                        <a href="#" class="text-white hover:text-blue-500 transition font-bold">LinkedIn</a>
                        <a href="#" class="text-white hover:text-zinc-400 transition font-bold">GitHub</a>
                    </div>
                </div>
            </div>

            <div class="glass p-8 rounded-[2.5rem]">
                <form action="#" method="POST" class="space-y-6">
                    <div>
                        <label class="text-[10px] font-bold uppercase text-zinc-500 mb-2 block">Nom complet</label>
                        <input type="text" class="input-glass w-full px-4 py-3 rounded-xl text-white text-sm" placeholder="John / Jane Doe">
                    </div>
                    
                    <div>
                        <label class="text-[10px] font-bold uppercase text-zinc-500 mb-2 block">Email</label>
                        <input type="email" class="input-glass w-full px-4 py-3 rounded-xl text-white text-sm" placeholder="example@company.com">
                    </div>

                    <div>
                        <label class="text-[10px] font-bold uppercase text-zinc-500 mb-2 block">Message</label>
                        <textarea rows="4" class="input-glass w-full px-4 py-3 rounded-xl text-white text-sm" placeholder="Votre message technique ou proposition..."></textarea>
                    </div>

                    <button type="submit" class="w-full py-4 bg-white text-black rounded-2xl font-bold text-sm hover:bg-blue-500 hover:text-white transition-all duration-300">
                        Envoyer la transmission
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="text-center py-10 text-zinc-600 text-[10px] uppercase tracking-widest">
        Arcadia Portfolio — Dossier Technique E4
    </footer>

</body>
</html>
